name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests -v

  model-policy:
    name: ${{ matrix.model }} (${{ matrix.expected }})
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: Raspberry Pi 4 Model B Rev 1.1
            expected: supported
          - model: Raspberry Pi 4 Model B Rev 1.5
            expected: supported
          - model: Raspberry Pi 3 Model B Plus Rev 1.3
            expected: rejected
          - model: Raspberry Pi 5 Model B Rev 1.0
            expected: rejected
          - model: Raspberry Pi Zero 2 W Rev 1.0
            expected: rejected
          - model: Raspberry Pi 400 Rev 1.0
            expected: rejected
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate model policy
        env:
          MODEL: ${{ matrix.model }}
          EXPECTED: ${{ matrix.expected }}
        run: |
          if [[ "${EXPECTED}" == "supported" ]]; then
            python3 scripts/configure-profile.py --validate-only --model "${MODEL}"
          elif python3 scripts/configure-profile.py --validate-only --model "${MODEL}"; then
            echo "Expected model to be rejected: ${MODEL}" >&2
            exit 1
          else
            echo "Correctly rejected out-of-scope model: ${MODEL}"
          fi

  required-test-gate:
    name: Required test gate
    if: ${{ always() }}
    needs:
      - unit-tests
      - model-policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify required test jobs
        env:
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          MODEL_POLICY_RESULT: ${{ needs.model-policy.result }}
        run: |
          if [[ "${UNIT_TESTS_RESULT}" != "success" \
            || "${MODEL_POLICY_RESULT}" != "success" ]]; then
            echo "Unit tests: ${UNIT_TESTS_RESULT}" >&2
            echo "Model policy: ${MODEL_POLICY_RESULT}" >&2
            exit 1
          fi
          echo "All required test jobs passed"
