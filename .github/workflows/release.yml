name: Attach release image

# Publishing a GitHub Release is the only event that can run this workflow.
# Pull-request merges and tag pushes do not create or publish releases.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build ${{ github.event.release.tag_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    environment: release
    steps:
      - name: Check out released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate tag and committed version
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          version="${TAG_NAME#v}"
          [[ "${TAG_NAME}" == v* && "${version}" =~ ${semver} ]] || {
            echo "Release tag must be v<semantic-version>: ${TAG_NAME}" >&2
            exit 1
          }
          committed_version="$(tr -d '[:space:]' < VERSION)"
          [[ "${version}" == "${committed_version}" ]] || {
            echo "Tag ${version} does not match VERSION (${committed_version})" >&2
            exit 1
          }
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Run static tests
        run: python3 -m unittest discover -s tests -v

      - name: Reclaim runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force
          df -h

      - name: Install pi-gen host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binfmt-support qemu-user-binfmt

      - name: Register arm64 emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
          reset: true

      - name: Verify arm64 emulation
        run: |
          command -v qemu-aarch64
          handler=/proc/sys/fs/binfmt_misc/qemu-aarch64
          test -r "${handler}"
          grep --fixed-strings --line-regexp enabled "${handler}"
          grep --extended-regexp '^flags:.*F' "${handler}"

      - name: Build release image
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          image_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/ppspi-${VERSION}-raspios-trixie-arm64.img.xz"
          ./scripts/build-image.sh \
            --version "${VERSION}" \
            --output-dir artifacts \
            --image-url "${image_url}"

      - name: Validate built release image
        run: ./scripts/validate-image.sh artifacts/*.img.xz

      - name: Validate exact release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          python3 scripts/validate-release-assets.py \
            --directory artifacts \
            --version "${VERSION}" \
            --tag "${TAG_NAME}" \
            --repository "${GITHUB_REPOSITORY}" \
            --expected-commit "$(git rev-parse HEAD)"

      - name: Attach assets to the published GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "${TAG_NAME}" \
            "artifacts/ppspi-${VERSION}-raspios-trixie-arm64.img.xz" \
            "artifacts/ppspi-${VERSION}-raspios-trixie-arm64.img.xz.sha256" \
            "artifacts/build-info.json" \
            "artifacts/ppspi-${VERSION}-raspios-trixie-arm64.rpi-imager-manifest" \
            --clobber
