name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck shfmt
          python -m pip install --disable-pip-version-check ruff==0.12.5 yamllint==1.37.1
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          npm install --global markdownlint-cli2@0.18.1

      - name: Run Python checks
        run: ruff check files/ppstime scripts tests

      - name: Run shell checks
        run: |
          shellcheck scripts/install.sh scripts/build-image.sh scripts/package-release.sh \
            pi-gen/stage-pps-pi/prerun.sh pi-gen/stage-pps-pi/01-install/00-run.sh
          shfmt -d -i 4 -ci -sr scripts/install.sh scripts/build-image.sh scripts/package-release.sh \
            pi-gen/stage-pps-pi/prerun.sh pi-gen/stage-pps-pi/01-install/00-run.sh

      - name: Run YAML and workflow checks
        run: |
          yamllint .
          "$(go env GOPATH)/bin/actionlint"

      - name: Run Markdown checks
        run: markdownlint-cli2
