name: Build test image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version used in artifact names
        required: true
        default: 0.1.0-dev
        type: string

permissions:
  contents: read

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Raspberry Pi OS Trixie arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run static tests
        run: python3 -m unittest discover -s tests -v
      - name: Reclaim runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force
          df -h
      - name: Install pi-gen host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binfmt-support qemu-user-binfmt
      - name: Register arm64 emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
          reset: true
      - name: Verify arm64 emulation
        run: |
          command -v qemu-aarch64
          handler=/proc/sys/fs/binfmt_misc/qemu-aarch64
          test -r "${handler}"
          grep --fixed-strings --line-regexp enabled "${handler}"
          grep --extended-regexp '^flags:.*F' "${handler}"
      - name: Build and package image
        env:
          VERSION: ${{ inputs.version }}
        run: ./scripts/build-image.sh --version "${VERSION}" --output-dir artifacts
      - name: Validate built image
        run: ./scripts/validate-image.sh artifacts/*.img.xz
      - name: Validate local Imager manifest generation
        run: |
          python3 scripts/generate-imager-manifest.py \
            --image artifacts/*.img.xz \
            --build-info artifacts/build-info.json \
            --output /tmp/ppspi-local.rpi-imager-manifest
      - name: Upload test image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ppspi-${{ inputs.version }}-trixie-arm64
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
